[build]
builder = "NIXPACKS"
buildCommand = "npm install -g pnpm@10.30.1 && pnpm install --frozen-lockfile && pnpm run build"

[deploy]
startCommand = "pnpm run start:http"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[env]
NODE_ENV = "production"
